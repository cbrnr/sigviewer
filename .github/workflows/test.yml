name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        shell: ${{ matrix.shell || 'bash' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-15

          - name: Linux
            runner: ubuntu-24.04

          - name: Windows
            runner: windows-2025
            shell: msys2 {0}
            cmake_flags: -G Ninja

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-libiconv
            autoconf
            automake
            make

      - name: Cache Homebrew downloads
        if: runner.os == 'macOS'
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-qt-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/test.yml') }}
          restore-keys: brew-qt-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install qt

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update -qq
          sudo apt install -y cmake build-essential qt6-base-dev qt6-tools-dev

      - name: Build dependencies
        run: cmake -P external/build_deps.cmake

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
