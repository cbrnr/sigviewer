name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  linux:
    uses: ./.github/workflows/build-linux.yml

  macos:
    uses: ./.github/workflows/build-macos.yml
    secrets: inherit

  windows:
    uses: ./.github/workflows/build-windows.yml

  release:
    name: Create GitHub Release
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sigviewer-*
          path: artifacts/

      - name: Prepare release assets
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p release-assets

          find artifacts/sigviewer-linux-x86_64 -type f -name 'sigviewer' \
            -exec tar -czf release-assets/sigviewer-${VERSION}-linux-x86_64.tar.gz -C "$(dirname {})" sigviewer \;
          find artifacts/sigviewer-linux-aarch64 -type f -name 'sigviewer' \
            -exec tar -czf release-assets/sigviewer-${VERSION}-linux-aarch64.tar.gz -C "$(dirname {})" sigviewer \;
          find artifacts/sigviewer-macos-arm64 -name '*.dmg' \
            -exec cp {} release-assets/sigviewer-${VERSION}-macos-arm64.dmg \;
          find artifacts/sigviewer-windows-x86_64 -name '*.exe' \
            -exec cp {} release-assets/sigviewer-${VERSION}-windows-x86_64.exe \;

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --generate-notes \
            release-assets/*
